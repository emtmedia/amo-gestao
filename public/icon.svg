<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0a2154"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Dove shape -->
  <g transform="translate(256,200)" fill="white">
    <!-- Body -->
    <ellipse cx="0" cy="30" rx="55" ry="35" opacity="0.95"/>
    <!-- Head -->
    <circle cx="-40" cy="0" r="22" opacity="0.95"/>
    <!-- Beak -->
    <polygon points="-62,-5 -75,0 -62,5" fill="#EDD99A"/>
    <!-- Eye -->
    <circle cx="-45" cy="-3" r="3" fill="#1e3a5f"/>
    <!-- Wing up -->
    <path d="M-10,10 Q30,-60 80,-50 Q50,-20 20,5 Z" opacity="0.85"/>
    <!-- Wing spread -->
    <path d="M10,15 Q60,-40 100,-25 Q65,0 30,15 Z" opacity="0.75"/>
    <!-- Tail -->
    <path d="M45,25 Q75,10 85,30 Q65,35 50,35 Z" opacity="0.8"/>
    <!-- Olive branch -->
    <g transform="translate(-65,5)">
      <line x1="0" y1="0" x2="-20" y2="15" stroke="#4ade80" stroke-width="2"/>
      <ellipse cx="-8" cy="5" rx="5" ry="3" fill="#4ade80" transform="rotate(-20,-8,5)"/>
      <ellipse cx="-16" cy="11" rx="5" ry="3" fill="#4ade80" transform="rotate(-30,-16,11)"/>
      <ellipse cx="-12" cy="9" rx="4" ry="2.5" fill="#22c55e" transform="rotate(15,-12,9)"/>
    </g>
  </g>
  <!-- Text AMO -->
  <text x="256" y="320" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="72" fill="white" letter-spacing="8">AMO</text>
  <!-- Subtext -->
  <text x="256" y="360" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="400" font-size="20" fill="#EDD99A" letter-spacing="3">GESTÃO</text>
</svg>
